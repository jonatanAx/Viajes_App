<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Jonatan Viajes | Solicitar</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />

    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
</head>

<body>

    <nav class="navbar navbar-expand-lg mi-navbar">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">J-Transporte</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Historial</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <div id="seccionFormulario" class="card shadow-sm border-0 p-4" style="background-color: var(--color-blanco); border-radius: 15px;">
                    <h3 class="fw-bold mb-4" style="color: var(--color-primario);">Solicitar Viaje</h3>
                    <form id="viajeForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre Completo</label>
                            <input type="text" class="form-control border-0 bg-light" placeholder="Ej. Jonatan" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Punto de Recogida</label>
                            <div class="input-group">
                                <input type="text" id="origen" class="form-control border-0 bg-light" placeholder="Selecciona en el mapa" readonly>
                                <button class="btn btn-primary" type="button" data-bs-toggle="modal" data-bs-target="#mapaModal" onclick="setPaso(1)">
                                    <i class="bi bi-geo-alt"></i> Buscar
                                </button>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Destino</label>
                            <div class="input-group">
                                <input type="text" id="destino" class="form-control border-0 bg-light" placeholder="¿A dónde vas?" readonly>
                                <button class="btn btn-danger" type="button" data-bs-toggle="modal" data-bs-target="#mapaModal" onclick="setPaso(2)">
                                    <i class="bi bi-map"></i> Buscar
                                </button>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Costo del Viaje ($)</label>
                            <input type="number" id="costo" class="form-control border-0 bg-light" placeholder="0.00" step="0.01" required>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 py-2 shadow-sm">Confirmar Pedido</button>
                    </form>
                </div>

                <div id="contenedorRecorrido" class="card shadow-sm border-0 p-4 d-none" style="border-radius: 15px;">
                    <h3 class="fw-bold mb-3" style="color: var(--color-primario);">Tu Recorrido</h3>
                    <div id="mapaRecorrido" style="height: 400px; width: 100%; border-radius: 10px;" class="mb-3"></div>
                    <div class="alert alert-info border-0 shadow-sm">
                        <i class="bi bi-info-circle-fill me-2"></i>
                        <strong>¡Pedido en curso!</strong> Costo: $<span id="resumenCosto">0.00</span>.
                    </div>
                    <button class="btn btn-dark w-100" onclick="location.reload()">Solicitar otro viaje</button>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="mapaModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content" style="border-radius: 15px; overflow: hidden;">
                <div class="modal-header bg-dark text-white border-0">
                    <h5 class="modal-title">Selecciona la ubicación</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <div id="map" style="height: 450px; width: 100%;"></div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-success w-100 py-2" data-bs-dismiss="modal">Confirmar Ubicación</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white pt-4 pb-2 mt-5">
        <div class="container text-center">
            <p class="mb-1 small">&copy; 2026 Mi App de Transporte | UGB San Miguel</p>
            <div class="mb-3">
                <a href="https://wa.me/50379425930" target="_blank" class="text-white fs-4"><i class="bi bi-whatsapp"></i></a>
            </div>
        </div>
    </footer>

    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/mapa.js"></script>
</body>
</html>
