<!DOCTYPE html>
<html lang='es'> <head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Jonatan Viajes | Solicitar</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg mi-navbar">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">J-Transporte</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Historial</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 p-4" style="background-color: var(--color-blanco); border-radius: 15px;">
                    <h3 class="fw-bold mb-4" style="color: var(--color-primario);">Solicitar Viaje</h3>
                    <form id="viajeForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre Completo</label>
                            <input type="text" class="form-control border-0 bg-light" placeholder="Ej. Jonatan" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Punto de Recogida</label>
                            <input type="text" id="origen" class="form-control" placeholder="Selecciona en el mapa" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Destino</label>
                            <input type="text" id="destino" class="form-control" placeholder="¿A dónde vas?" readonly>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Costo del Viaje ($)</label>
                            <input type="number" id="costo" class="form-control" placeholder="0.00" step="0.01" required>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 py-2 shadow-sm">Confirmar Pedido</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div id="map" class="shadow-sm" style="height: 550px; border-radius: 15px;"></div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white pt-4 pb-2 mt-5">
        <div class="container text-center">
            <p class="mb-1">&copy; 2026 Mi App de Transporte. Todos los derechos reservados.</p>
            <p class="small text-secondary">
                Desarrollado por <span class="text-white fw-bold">Jonatan</span> | UGB San Miguel
            </p>
            <div class="mb-3">
                <a href="https://wa.me/50379425930" target="_blank" class="text-white fs-4">
                    <i class="bi bi-whatsapp"></i>
                </a>
            </div>
        </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/mapa.js"></script>
    <script src="js/jquery-3.7.1.min.js"></script>
</body>

</html>
